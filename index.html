<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=IBM+Plex+Sans+Thai:wght@100;200;300;400;500;600;700&display=swap');

        :root {
            --bg: #1A3263;
            --ink: #1A1916;
            --ink-soft: #58554D;
            --ink-muted: #e1d9cc;
            --gold: #FFC570;
            --white: #FFFFFF;
            --border: rgba(0,0,0,0.09);
            --border-strong: rgba(0,0,0,0.15);
            --accent: #2563EB;
        }

        html, body {
            min-height: 100vh;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--ink);
            overflow-x: hidden;
        }

        .page {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 1.5rem 5rem;
            gap: 0;
        }

        /* HERO */
        .hero {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeUp 0.6s 0.1s both;
        }
        .handFont { font-family: "Caveat", cursive; font-weight: 600; }
        .eyebrowedit { font-size: 11px; font-weight: 500; letter-spacing: 0.16em; color: #EFD2B0; margin-bottom: 0.75rem; }
        .line { font-size: 1.25rem; margin: 10px 0; white-space: pre-wrap; color: #EFD2B0; }
        .cursor { border-right: 2px solid #547792; animation: blink 0.7s step-end infinite; }
        @keyframes blink { 50% { border-color: transparent; } }

        /* MAIN CONTENT (hidden until typewriter done) */
        #mainContent {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            opacity: 0;
            visibility: hidden;
        }
        #mainContent.revealed {
            visibility: visible;
            animation: fadeUp 0.7s ease forwards;
        }

        /* SCENE HINT */
        .scene-hint {
            font-size: 13px;
            color: var(--ink-muted);
            text-align: center;
            margin-bottom: 0.5rem;
            min-height: 20px;
        }

        /* CARD / FRAME */
        .card { text-align: center; margin: 20px auto; width: 320px; }

        .frame {
            position: relative;
            display: inline-block;
            border: 6px solid #FFC570;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            background: #000;
            width: 100%;
        }

        .frame img, .frame video {
            width: 100%;
            display: block;
            transition: opacity 0.5s ease;
        }

        .frame img.fade-out { opacity: 0; }
        .frame img.fade-in  { opacity: 1; }

        /* ── VIDEO CARD (hidden by default) ── */
        #videoCard {
            text-align: center;
            margin: 20px auto;
            width: 320px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(24px);
            transition: opacity 0.6s ease, transform 0.6s ease, visibility 0.6s;
        }
        #videoCard.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        #videoCard .scene-hint { margin-bottom: 0.5rem; }

        /* BUTTONS */
        .wish-btn {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            padding: 12px 0;
            font-size: 1.2rem;
            background: rgba(84,119,146,0.9);
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }
        .wish-btn:hover { background: #1A3263; }

        .candle-btn {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 25%;
            font-size: 1.1rem;
            background: rgba(84,119,146,0.85);
            color: white;
            opacity: 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: none;
            transition: background 0.3s, transform 0.2s;
        }
        .candle-btn:hover { background: rgba(26,50,99,0.95); transform: translate(-50%,-50%) scale(1.05); }
        .candle-btn:disabled { opacity: 0.5; cursor: default; transform: translate(-50%,-50%) scale(1); }

        /* FAN */
        .stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
            width: 100%;
            max-width: 480px;
        }
        .hint-text { font-size: 13px; color: var(--ink-muted); text-align: center; min-height: 20px; transition: color 0.3s; }

        .fan-wrap { position: relative; width: 280px; height: 320px; cursor: pointer; }
        .fan-wrap .c {
            position: absolute;
            bottom: 0; left: 50%;
            width: 120px; margin-left: -60px; height: 172px;
            border-radius: 14px;
            border: 0.5px solid var(--border-strong);
            background: var(--white);
            transform-origin: bottom center;
            transition: transform 0.42s cubic-bezier(.4,0,.2,1), opacity 0.45s ease, box-shadow 0.2s;
            display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px;
            user-select: none;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .fan-wrap .c .c-icon { font-size: 32px; }
        .fan-wrap .c .c-num { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; color: var(--ink-muted); }

        .fan-wrap.idle .c:nth-child(1) { transform: rotate(-32deg); z-index: 1; }
        .fan-wrap.idle .c:nth-child(2) { transform: rotate(-16deg); z-index: 2; }
        .fan-wrap.idle .c:nth-child(3) { transform: rotate(0deg);   z-index: 3; }
        .fan-wrap.idle .c:nth-child(4) { transform: rotate(16deg);  z-index: 2; }
        .fan-wrap.idle .c:nth-child(5) { transform: rotate(32deg);  z-index: 1; }

        .fan-wrap.spread .c:nth-child(1) { transform: rotate(-52deg) translateY(-22px); z-index: 1; }
        .fan-wrap.spread .c:nth-child(2) { transform: rotate(-26deg) translateY(-12px); z-index: 2; }
        .fan-wrap.spread .c:nth-child(3) { transform: rotate(0deg)   translateY(-7px);  z-index: 3; }
        .fan-wrap.spread .c:nth-child(4) { transform: rotate(26deg)  translateY(-12px); z-index: 2; }
        .fan-wrap.spread .c:nth-child(5) { transform: rotate(52deg)  translateY(-22px); z-index: 1; }

        .fan-wrap .c.read { opacity: 0.22; pointer-events: none; }
        .fan-wrap.spread .c:not(.read):hover {
            box-shadow: 0 0 0 2.5px var(--accent), 0 4px 20px rgba(0,0,0,0.1);
            z-index: 20 !important;
        }

        /* MSG CARD */
        .msg-area { width: 100%; }
        .msg-card {
            background: var(--white);
            border: 0.5px solid var(--border-strong);
            border-radius: 18px;
            padding: 1.75rem 1.5rem 1.25rem;
            display: flex; flex-direction: column; gap: 1rem;
            opacity: 0; transform: translateY(14px);
            transition: opacity 0.38s ease, transform 0.38s ease;
            pointer-events: none;
        }
        .msg-card.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .msg-top { display: flex; align-items: center; gap: 12px; }
        .msg-icon-wrap {
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
        }
        .msg-title { font-size: 16px; font-weight: 500; color: var(--ink); }
        .msg-body { font-family: 'Playfair Display', serif; font-style: italic; font-size: 16px; color: var(--ink-soft); line-height: 1.85; }
        .msg-from { font-size: 12px; color: var(--ink-muted); padding-top: 0.75rem; border-top: 0.5px solid var(--border); }
        .pbar-wrap { margin-top: 0.25rem; height: 2px; background: rgba(0,0,0,0.07); border-radius: 2px; overflow: hidden; }
        .pbar-fill { height: 100%; background: var(--gold); transform-origin: left; transform: scaleX(1); }
        .progress { font-size: 13px; color: var(--ink-muted); text-align: center; min-height: 20px; transition: color 0.3s; }
        .progress.done { color: var(--gold); font-weight: 500; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── scene 3 : gift box ── */
        #giftCard {
            text-align: center;
            margin: 20px auto;
            width: 320px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(24px);
            transition: opacity 0.6s ease, transform 0.6s ease, visibility 0.6s;
        }
        #giftCard.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        /* รูปในกล่องของขวัญ — คลิกได้ */
        #giftImage {
            cursor: pointer;
            transition: transform 0.15s ease;
        }
        #giftImage:hover { transform: scale(1.03); }
        #giftImage:active { transform: scale(0.97); }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition: none !important; }
        }
        @media (max-width: 420px) {
            .fan-wrap { width: 240px; height: 280px; }
            .fan-wrap .c { width: 104px; margin-left: -52px; height: 152px; }
        }
    </style>
</head>

<body>
<div class="page">

    <!-- typewriter hero -->
    <div class="hero eyebrowedit handFont" id="hero"></div>

    <!-- main content (revealed after typewriter) -->
    <div id="mainContent">

        <!-- scene 1 : cake slideshow -->
        <p class="scene-hint" id="sceneHint">click the button to make a wish!</p>
        <div class="card">
            <div class="frame">
                <img id="cardImage" src="./src/image/P1.1.png" alt="Birthday Cake">
                <button class="wish-btn" id="wishBtn" onclick="handleWishBtn()">✨ Make a Wish ✨</button>
                <div class="candle-btn" id="candleBtn" onclick="changeImage()"></div>
            </div>
        </div>

        <audio id="hbd">
            <source src="./src/audio/hbd.mp3" type="audio/mpeg">
        </audio>

        <!-- ── scene 2 : countdown video (hidden until slideshow done) ── -->
        <div id="videoCard">
            <p class="scene-hint" id="videoHint">🎉 And now... a little something for you!</p>
            <div class="card">
                <div class="frame">
                    <video id="countdownVideo" src="./src/image/countdown.mp4"
                           controls playsinline preload="metadata">
                    </video>
                </div>
            </div>
        </div>

        <!-- ── scene 3 : gift box (hidden until video ends) ── -->
        <div id="giftCard">
            <p class="scene-hint" id="giftHint">🎁 Here's a special gift for you! — tap to unwrap!</p>
            <div class="card">
                <div class="frame">
                    <img id="giftImage" src="./src/image/gift_box.png" alt="Gift" onclick="unwrapGift()">
                </div>
            </div>
        </div>

          <!-- ── Happy Birthday message ── -->
        <div id="bdMessage">
            <p style="color: #FFC570;">Happy Birthday Dev ❤️</p>
        </div>

        <!-- fan cards -->
        <div class="stage" style="margin-top: 2rem;">
            <p class="hint-text" id="hint">วางเมาส์เพื่อแผ่ไพ่ · เลือกไพ่เพื่ออ่านข้อความ</p>

            <div class="fan-wrap idle" id="fan" onmouseenter="spreadFan()" onmouseleave="foldFan()">
                <div class="c" onclick="pick(0)"><span class="c-icon">🎂</span><span class="c-num">01</span></div>
                <div class="c" onclick="pick(1)"><span class="c-icon">🌸</span><span class="c-num">02</span></div>
                <div class="c" onclick="pick(2)"><span class="c-icon">✨</span><span class="c-num">03</span></div>
                <div class="c" onclick="pick(3)"><span class="c-icon">🌟</span><span class="c-num">04</span></div>
                <div class="c" onclick="pick(4)"><span class="c-icon">🎁</span><span class="c-num">05</span></div>
            </div>

            <div class="msg-area">
                <div class="msg-card" id="msgCard">
                    <div class="msg-top">
                        <div class="msg-icon-wrap" id="msgIcon"></div>
                        <span class="msg-title" id="msgTitle"></span>
                    </div>
                    <p class="msg-body" id="msgBody"></p>
                    <p class="msg-from" id="msgFrom"></p>
                    <div class="pbar-wrap">
                        <div class="pbar-fill" id="pFill"></div>
                    </div>
                </div>
            </div>

            <p class="progress" id="progress"></p>
        </div>

    </div><!-- /#mainContent -->
</div>

<script>
    // ─── Typewriter → reveal mainContent ────────────────────────────────────
    const lines = [
        "This year ...",
        "29 June 2026",
        "There is something I want to say to you!"
    ];
    let lineIdx = 0, charIdx = 0;

    function typeWriter() {
        if (lineIdx >= lines.length) { revealContent(); return; }

        if (charIdx === 0) {
            const p = document.createElement("p");
            p.className = "line";
            p.id = "line" + lineIdx;
            document.getElementById("hero").appendChild(p);
        }

        const currentLine = document.getElementById("line" + lineIdx);
        currentLine.innerHTML = lines[lineIdx].substring(0, charIdx + 1) + '<span class="cursor"></span>';
        charIdx++;

        if (charIdx < lines[lineIdx].length) {
            setTimeout(typeWriter, 100);
        } else {
            currentLine.innerHTML = lines[lineIdx];
            charIdx = 0; lineIdx++;
            setTimeout(typeWriter, 1000);
        }
    }

    function revealContent() {
        document.getElementById("mainContent").classList.add("revealed");
    }

    typeWriter();

    // ─── Scene 1 : image slideshow ──────────────────────────────────────────
    const images = [
        "./src/image/P1.1.jpeg",
        "./src/image/P1.2.png",
        "./src/image/P1.3.png",
        "./src/image/P1.4.png"
    ];
    let current = 0;

    function handleWishBtn() {
        document.getElementById("hbd").play();
        document.getElementById("wishBtn").style.display = "none";
        document.getElementById("candleBtn").style.display = "block";
        document.getElementById("sceneHint").textContent = "Click the candle to blow it out! Tap a few times to see the magic!";
        changeImage();
    }

     function changeImage() {
            if (current >= images.length - 1) return;

            const img = document.getElementById("cardImage");
            img.classList.add("fade-out");

            setTimeout(() => {
                current++;
                img.src = images[current];
                img.classList.remove("fade-out");
                img.classList.add("fade-in");
                setTimeout(() => img.classList.remove("fade-in"), 500);

                // ── รูปสุดท้าย → รอเพลง HBD จบก่อน แล้ว fade video เข้ามา ──
                if (current >= images.length - 1) {
                    document.getElementById("candleBtn").style.display = "none";
                    document.getElementById("sceneHint").textContent = "🎂 HBD!";

                    const audio = document.getElementById("hbd");

                    function showVideo() {
                        const vc = document.getElementById("videoCard");
                        if(vc) {
                            vc.classList.add("visible");
                            
                            // auto-play video
                            const vid = document.getElementById("countdownVideo");
                            if(vid) {
                                vid.play().catch(() => {});
                                // รอ video จบ → แสดง giftCard
                                vid.addEventListener("ended", showGift, { once: true });
                            }

                            // scroll ไปที่ video
                            vc.scrollIntoView({ behavior: "smooth", block: "start" });
                        }
                    }

                    function showGift() {
                        const gc = document.getElementById("giftCard");
                        if(gc) {
                            gc.classList.add("visible");
                            gc.scrollIntoView({ behavior: "smooth", block: "start" });
                        }
                    }

                    if (audio.paused || audio.ended) {
                        // เพลงหยุดแล้ว (กรณี edge) → แสดงเลย
                        showVideo();
                    } else {
                        // รอ event ended → แสดง
                        audio.addEventListener("ended", showVideo, { once: true });
                    }
                } 
                // ปิดวงเล็บของ setTimeout ให้ตรงกับเปิดด้านบน
            }, 500);
        }

    // ─── Scene 3 : unwrap gift ───────────────────────────────────────────────
    let unwrapped = false;

    function unwrapGift() {
        if (unwrapped) return;
        unwrapped = true;

        const img = document.getElementById("giftImage");
        img.classList.add("fade-out");

        setTimeout(() => {
            img.src = "./src/image/art_toy.png";
            img.alt = "Art Toy";
            img.classList.remove("fade-out");
            img.classList.add("fade-in");
            setTimeout(() => img.classList.remove("fade-in"), 500);

            document.getElementById("giftHint").textContent = "🎨 Surprise! 🎉";
            img.style.cursor = "default";
        }, 400);
    }

    // ─── Fan cards ──────────────────────────────────────────────────────────
    const CARDS = [
        { icon: '🎂', title: 'วันเกิด',  body: 'ขอให้ทุกความฝัน\nเป็นจริงในวันนี้\nและทุก ๆ วัน',        from: 'Mom' },
        { icon: '🌸', title: 'ความรัก',  body: 'ขอให้ชีวิต\nเต็มไปด้วยรอยยิ้ม\nและผู้คนที่รักคุณ',      from: 'Dad' },
        { icon: '✨', title: 'ความฝัน',  body: 'ทุกสิ่งที่ตั้งใจ\nขอให้สำเร็จ\nดั่งใจหมาย',             from: 'Gigi' },
        { icon: '🌟', title: 'ความสุข',  body: 'ขอให้แข็งแรง\nมีพลัง และมีความสุข\nทุกวันตลอดปี',       from: 'Jennie' },
        { icon: '🎁', title: 'ของขวัญ', body: 'ของขวัญที่ดีที่สุด\nคือการที่คุณมีอยู่\nในชีวิตของพวกเรา', from: 'Janjao' },
    ];

    const READ_DELAY = 4000;
    let busy = false, readCount = 0;

    const fan      = document.getElementById('fan');
    const msgCard  = document.getElementById('msgCard');
    const msgIcon  = document.getElementById('msgIcon');
    const msgTitle = document.getElementById('msgTitle');
    const msgBody  = document.getElementById('msgBody');
    const msgFrom  = document.getElementById('msgFrom');
    const pFill    = document.getElementById('pFill');
    const progress = document.getElementById('progress');
    const hint     = document.getElementById('hint');

    function spreadFan() { fan.classList.replace('idle', 'spread'); }
    function foldFan()   { if (!busy) fan.classList.replace('spread', 'idle'); }

    function pick(i) {
        if (busy) return;
        const cardEls = fan.querySelectorAll('.c');
        const el = cardEls[i];
        if (el.classList.contains('read')) return;

        busy = true;
        fan.classList.replace('spread', 'idle');
        hint.textContent = 'Opening…';

        const d = CARDS[i];
        msgIcon.textContent  = d.icon;
        msgTitle.textContent = d.title;
        msgBody.innerHTML    = d.body.replace(/\n/g, '<br>');
        msgFrom.textContent  = d.from;

        msgCard.classList.add('visible');

        pFill.style.transition = 'none';
        pFill.style.transform  = 'scaleX(1)';
        requestAnimationFrame(() => requestAnimationFrame(() => {
            pFill.style.transition = `transform ${READ_DELAY}ms linear`;
            pFill.style.transform  = 'scaleX(0)';
        }));

        setTimeout(() => {
            el.classList.add('read');
            readCount++;
            msgCard.classList.remove('visible');

            const left = CARDS.length - readCount;
            if (left > 0) {
                progress.textContent = `Opened ${readCount} cards · ${left} left`;
                hint.textContent     = 'Hover to spread cards · Click a card to read its message';
            } else {
                progress.textContent = 'Opened all cards 🎂 Happy Birthday!';
                progress.classList.add('done');
                hint.textContent = '';
            }
            busy = false;
        }, READ_DELAY);
    }
</script>
</body>
</html>
