<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
</head>
<style>
    .card2 {
        text-align: center;
        margin: 50px auto;
        width: 320px;
    }

    .frame {
        position: relative;
        display: inline-block;
        border: 6px solid #FFC570;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        background: #000;
        /* ป้องกันพื้นหลังขาว */

    }

    .frame video {
        width: 100%;
        height: auto;
        /* หรือใช้ height:100% + object-fit:cover */
        display: block;
    }


    .frame img {
        width: 100%;
        display: block;
        transition: opacity 0.5s ease;
    }

    .fade-out {
        opacity: 0.7;

    }

    .fade-in {
        opacity: 1;
    }

    .candle-btn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 80%;
        height: 25%;
        padding: 12px 0;
        font-size: 1.2rem;
        opacity: 0;
        /* background: rgba(84, 119, 146, 0.6); โปร่งใส */
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.2s, background 0.3s;
    }

    .candle-btn:hover {
        transform: translate(-50%, -50%) scale(1.05);

    }

    @keyframes slideUp2 {
        from {
            opacity: 0;
            transform: translateY(50px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .card2 {
        animation: slideUp2 0.8s ease-out forwards;
    }
</style>



<body>

   <div class="card">
    <div class="frame">
        <img id="cardImage" src="./src/image/scene1-1.jpeg" alt="Birthday Cake">

        <button class="wish-btn" id="wishBtn" onclick="handleWishBtn()">✨ Make a Wish ✨</button>
    </div>
</div>

<script>
    const images = [
    "./src/image/scene1-1.jpeg",
    "./src/image/P1.2.png",
    "./src/image/P1.3.png",
    "./src/image/P1.4.png"
];
let current = 0;

function handleWishBtn() {
    if (current === 0) {
        // กดครั้งแรก → เล่นเพลง + เปลี่ยนรูป
        makeWish();
    }
    changeImage();
}

function makeWish() {
    const audio = document.getElementById("hbd");
    let count = 0;
    audio.addEventListener("ended", () => {
        count++;
        if (count < 1) audio.play();
    });
    audio.play();
}

function changeImage() {
    const img = document.getElementById("cardImage");
    const btn = document.getElementById("wishBtn");

    if (current < images.length - 1) {
        img.classList.add("fade-out");

        setTimeout(() => {
            current++;
            img.src = images[current];
            img.classList.remove("fade-out");
            img.classList.add("fade-in");

            // เปลี่ยน label ปุ่มตามรูปที่แสดง
            if (current === images.length - 1) {
                btn.textContent = "🎉 Candles Out!";
                btn.disabled = true;
                btn.style.opacity = "0.5";
                btn.style.cursor = "default";
            } else {
                btn.textContent = "🕯️ Blow the Candles!";
            }

            setTimeout(() => img.classList.remove("fade-in"), 500);
        }, 500);
    }
}
</script>


</body>


</html>
