<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=IBM+Plex+Sans+Thai:wght@100;200;300;400;500;600;700&display=swap');

        :root {
            --bg: #1A3263;
            --ink: #1A1916;
            --ink-soft: #58554D;
            --ink-muted: #e1d9cc;
            --gold: #FFC570;
            --gold-light: #EFE4CC;
            --white: #FFFFFF;
            --border: rgba(0, 0, 0, 0.09);
            --border-strong: rgba(0, 0, 0, 0.15);
            --accent: #2563EB;
            --radius: 14px;
        }

        html,
        body {
            min-height: 100vh;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--ink);
            overflow-x: hidden;
        }

        .page {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 1.5rem 5rem;
            gap: 0;
        }

        .hero {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeUp 0.6s 0.1s both;
            font-optical-sizing: auto;
            font-weight: 600;
            font-style: normal;
        }

        .handFont {
            font-family: "Caveat", cursive;
            font-optical-sizing: auto;
            font-weight: 600;
            font-style: normal;
        }

        .eyebrow {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.16em;
            color: #EFD2B0;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }

        .eyebrowedit {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.16em;
            color: #EFD2B0;
            margin-bottom: 0.75rem;
        }

        .headline {
            font-family: 'Playfair Display', serif;
            font-size: clamp(40px, 9vw, 80px);
            font-weight: 400;
            line-height: 1.05;
            color: var(--ink);
            margin-bottom: 0.6rem;
        }

        .sub {
            font-size: 15px;
            color: var(--ink-soft);
            line-height: 1.6;
        }

        .line {
            font-size: 1.25rem;
            margin: 10px 0;
            white-space: pre-wrap;
            color: #EFD2B0;
        }

        .cursor {
            border-right: 2px solid #547792;
            animation: blink 0.7s step-end infinite;
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        .stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
            width: 100%;
            max-width: 480px;
            animation: fadeUp 0.6s 0.25s both;
        }

        .hint-text {
            font-size: 13px;
            color: var(--ink-muted);
            text-align: center;
            min-height: 20px;
            transition: color 0.3s;
        }

        /* FAN */
        .fan-wrap {
            position: relative;
            width: 280px;
            height: 320px;
            cursor: pointer;
        }

        .fan-wrap .c {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 120px;
            margin-left: -60px;
            height: 172px;
            border-radius: 14px;
            border: 0.5px solid var(--border-strong);
            background: var(--white);
            transform-origin: bottom center;
            transition: transform 0.42s cubic-bezier(.4, 0, .2, 1), opacity 0.45s ease, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
            user-select: none;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        .fan-wrap .c .c-icon { font-size: 32px; }
        .fan-wrap .c .c-num {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            color: var(--ink-muted);
        }

        .fan-wrap.idle .c:nth-child(1) { transform: rotate(-32deg); z-index: 1; }
        .fan-wrap.idle .c:nth-child(2) { transform: rotate(-16deg); z-index: 2; }
        .fan-wrap.idle .c:nth-child(3) { transform: rotate(0deg);   z-index: 3; }
        .fan-wrap.idle .c:nth-child(4) { transform: rotate(16deg);  z-index: 2; }
        .fan-wrap.idle .c:nth-child(5) { transform: rotate(32deg);  z-index: 1; }

        .fan-wrap.spread .c:nth-child(1) { transform: rotate(-52deg) translateY(-22px); z-index: 1; }
        .fan-wrap.spread .c:nth-child(2) { transform: rotate(-26deg) translateY(-12px); z-index: 2; }
        .fan-wrap.spread .c:nth-child(3) { transform: rotate(0deg)   translateY(-7px);  z-index: 3; }
        .fan-wrap.spread .c:nth-child(4) { transform: rotate(26deg)  translateY(-12px); z-index: 2; }
        .fan-wrap.spread .c:nth-child(5) { transform: rotate(52deg)  translateY(-22px); z-index: 1; }

        .fan-wrap .c.read { opacity: 0.22; pointer-events: none; }
        .fan-wrap.spread .c:not(.read):hover {
            box-shadow: 0 0 0 2.5px var(--accent), 0 4px 20px rgba(0, 0, 0, 0.1);
            z-index: 20 !important;
        }

        /* MSG CARD */
        .msg-area { width: 100%; }

        .msg-card {
            background: var(--white);
            border: 0.5px solid var(--border-strong);
            border-radius: 18px;
            padding: 1.75rem 1.5rem 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            opacity: 0;
            transform: translateY(14px);
            transition: opacity 0.38s ease, transform 0.38s ease;
            pointer-events: none;
        }

        .msg-card.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .msg-top { display: flex; align-items: center; gap: 12px; }

        .msg-icon-wrap {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .msg-title { font-size: 16px; font-weight: 500; color: var(--ink); }

        .msg-body {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 16px;
            color: var(--ink-soft);
            line-height: 1.85;
        }

        .msg-from {
            font-size: 12px;
            color: var(--ink-muted);
            padding-top: 0.75rem;
            border-top: 0.5px solid var(--border);
        }

        .pbar-wrap {
            margin-top: 0.25rem;
            height: 2px;
            background: rgba(0, 0, 0, 0.07);
            border-radius: 2px;
            overflow: hidden;
        }

        .pbar-fill {
            height: 100%;
            background: var(--gold);
            transform-origin: left;
            transform: scaleX(1);
        }

        .progress {
            font-size: 13px;
            color: var(--ink-muted);
            text-align: center;
            min-height: 20px;
            transition: color 0.3s;
        }

        .progress.done { color: var(--gold); font-weight: 500; }

        footer {
            margin-top: 5rem;
            text-align: center;
            animation: fadeUp 0.6s 0.4s both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition: none !important; }
        }

        @media (max-width: 420px) {
            .fan-wrap { width: 240px; height: 280px; }
            .fan-wrap .c { width: 104px; margin-left: -52px; height: 152px; }
        }

        /* scene 1 */
        .scene-hint {
            font-size: 13px;
            color: var(--ink-muted);
            text-align: center;
            margin-bottom: 0.5rem;
            min-height: 20px;
        }

        .card {
            text-align: center;
            margin: 20px auto;
            width: 320px;
            opacity: 0;
            transform: translateY(50px);
            animation: slideUp 1s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .frame {
            position: relative;
            display: inline-block;
            border: 6px solid #FFC570;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            background: #000;
        }

        .frame img {
            width: 100%;
            display: block;
            transition: opacity 0.5s ease;
        }

        .frame img.fade-out { opacity: 0; }
        .frame img.fade-in  { opacity: 1; }

        /* ปุ่มหลักที่แสดงตอนแรก (Make a Wish) */
        .wish-btn {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 12px 0;
            font-size: 1.2rem;
            background: rgba(84, 119, 146, 0.9);
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.3s, opacity 0.3s;
        }

        .wish-btn:hover { background: #1A3263; }

        /* ปุ่มกลางรูปสำหรับ blow candles (ซ่อนอยู่ก่อน) */
        .candle-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 25%;
            padding: 12px 20px;
            font-size: 1.1rem;
            background: rgba(84, 119, 146, 0.85);
            color: white;
            opacity: 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: none;
            transition: background 0.3s, transform 0.2s;
        }

        .candle-btn:hover {
            background: rgba(26, 50, 99, 0.95);
            transform: translate(-50%, -50%) scale(1.05);
        }

        .candle-btn:disabled {
            opacity: 0.5;
            cursor: default;
            transform: translate(-50%, -50%) scale(1);
        }
    </style>
</head>

<body>

<div class="page">

    <!-- typewriter hero -->
    <div class="hero eyebrowedit handFont" id="hero"></div>

    <!-- scene 1 : cake image + buttons -->
    <p class="scene-hint" id="sceneHint">click the button to make a wish!</p>
    <div class="card">
        <div class="frame">
            <!-- *** id="cardImage" เพิ่มเข้ามา *** -->
            <img id="cardImage" src="./src/image/scene1-1.jpeg" alt="Birthday Cake">

            <!-- ปุ่มแรก: Make a Wish (แสดงบน bottom bar) -->
            <button class="wish-btn" id="wishBtn" onclick="handleWishBtn()">✨ Make a Wish ✨</button>

            <!-- ปุ่มสอง: Blow Candles (แสดงกลางรูป, ซ่อนก่อน) -->
            <div class="candle-btn" id="candleBtn" onclick="changeImage()"> </div>
        </div>
    </div>

    <audio id="hbd">
        <source src="./src/audio/hbd.mp3" type="audio/mpeg">
    </audio>

    <!-- fan cards -->
    <div class="stage" style="margin-top: 2rem;">
        <p class="hint-text" id="hint">วางเมาส์เพื่อแผ่ไพ่ · เลือกไพ่เพื่ออ่านข้อความ</p>

        <div class="fan-wrap idle" id="fan" onmouseenter="spreadFan()" onmouseleave="foldFan()">
            <div class="c" onclick="pick(0)"><span class="c-icon">🎂</span><span class="c-num">01</span></div>
            <div class="c" onclick="pick(1)"><span class="c-icon">🌸</span><span class="c-num">02</span></div>
            <div class="c" onclick="pick(2)"><span class="c-icon">✨</span><span class="c-num">03</span></div>
            <div class="c" onclick="pick(3)"><span class="c-icon">🌟</span><span class="c-num">04</span></div>
            <div class="c" onclick="pick(4)"><span class="c-icon">🎁</span><span class="c-num">05</span></div>
        </div>

        <div class="msg-area">
            <div class="msg-card" id="msgCard">
                <div class="msg-top">
                    <div class="msg-icon-wrap" id="msgIcon"></div>
                    <span class="msg-title" id="msgTitle"></span>
                </div>
                <p class="msg-body" id="msgBody"></p>
                <p class="msg-from" id="msgFrom"></p>
                <div class="pbar-wrap">
                    <div class="pbar-fill" id="pFill"></div>
                </div>
            </div>
        </div>

        <p class="progress" id="progress"></p>
    </div>

</div>

<script>
    // ─── Scene 1 : image slideshow ───────────────────────────────────────────

    const images = [
        "./src/image/scene1-1.jpeg",
        "./src/image/P1.2.png",
        "./src/image/P1.3.png",
        "./src/image/P1.4.png"
    ];
    let current = 0;

    /** กดปุ่ม Make a Wish ครั้งแรก */
    function handleWishBtn() {
        // เล่นเพลง
        const audio = document.getElementById("hbd");
        audio.play();

        // ซ่อนปุ่ม wish-btn, แสดงปุ่ม candle-btn
        document.getElementById("wishBtn").style.display = "none";
        document.getElementById("candleBtn").style.display = "block";

        // อัปเดต hint
        document.getElementById("sceneHint").textContent = "Click the button make a wish!";

        // เปลี่ยนรูปไปรูปที่ 2 (index 1)
        changeImage();
    }

    /** เปลี่ยนรูปทีละใบ */
    function changeImage() {
        document.getElementById("sceneHint").textContent = "Click the candle to blow it out! Try to tap a few times to see the magic!";

        if (current >= images.length - 1) return; // ถึงรูปสุดท้ายแล้ว

        const img      = document.getElementById("cardImage");
        const candleBtn = document.getElementById("candleBtn");

        img.classList.add("fade-out");

        setTimeout(() => {
            current++;
            img.src = images[current];
            img.classList.remove("fade-out");
            img.classList.add("fade-in");

            setTimeout(() => img.classList.remove("fade-in"), 500);

            // รูปสุดท้าย → ปิดปุ่ม
            if (current >= images.length - 1) {
                // candleBtn.textContent = "🎉 Happy Birthday!";
                // candleBtn.disabled    = true;
                // document.getElementById("sceneHint").textContent = "🎂 สุขสันต์วันเกิด!";
            }
        }, 500);
    }

    // ─── Fan cards ───────────────────────────────────────────────────────────

    const CARDS = [
        { icon: '🎂', title: 'วันเกิด',   body: 'ขอให้ทุกความฝัน\nเป็นจริงในวันนี้\nและทุก ๆ วัน',       from: 'ด้วยความรักจาก ทุกคน' },
        { icon: '🌸', title: 'ความรัก',   body: 'ขอให้ชีวิต\nเต็มไปด้วยรอยยิ้ม\nและผู้คนที่รักคุณ',     from: 'จากใจ' },
        { icon: '✨', title: 'ความฝัน',   body: 'ทุกสิ่งที่ตั้งใจ\nขอให้สำเร็จ\nดั่งใจหมาย',            from: 'เชื่อในตัวเอง' },
        { icon: '🌟', title: 'ความสุข',   body: 'ขอให้แข็งแรง\nมีพลัง และมีความสุข\nทุกวันตลอดปี',      from: 'สุขสันต์วันเกิด' },
        { icon: '🎁', title: 'ของขวัญ',  body: 'ของขวัญที่ดีที่สุด\nคือการที่คุณมีอยู่\nในชีวิตของพวกเรา', from: 'รักคุณเสมอ' },
    ];

    const READ_DELAY = 4000;
    let busy = false, readCount = 0;

    const fan      = document.getElementById('fan');
    const msgCard  = document.getElementById('msgCard');
    const msgIcon  = document.getElementById('msgIcon');
    const msgTitle = document.getElementById('msgTitle');
    const msgBody  = document.getElementById('msgBody');
    const msgFrom  = document.getElementById('msgFrom');
    const pFill    = document.getElementById('pFill');
    const progress = document.getElementById('progress');
    const hint     = document.getElementById('hint');

    function spreadFan() { fan.classList.replace('idle', 'spread'); }
    function foldFan()   { if (!busy) fan.classList.replace('spread', 'idle'); }

    function pick(i) {
        if (busy) return;
        const cardEls = fan.querySelectorAll('.c');
        const el = cardEls[i];
        if (el.classList.contains('read')) return;

        busy = true;
        fan.classList.replace('spread', 'idle');
        hint.textContent = 'กำลังเปิดการ์ด…';

        const d = CARDS[i];
        msgIcon.textContent  = d.icon;
        msgTitle.textContent = d.title;
        msgBody.innerHTML    = d.body.replace(/\n/g, '<br>');
        msgFrom.textContent  = d.from;

        msgCard.classList.add('visible');

        pFill.style.transition = 'none';
        pFill.style.transform  = 'scaleX(1)';
        requestAnimationFrame(() => requestAnimationFrame(() => {
            pFill.style.transition = `transform ${READ_DELAY}ms linear`;
            pFill.style.transform  = 'scaleX(0)';
        }));

        setTimeout(() => {
            el.classList.add('read');
            readCount++;
            msgCard.classList.remove('visible');

            const left = CARDS.length - readCount;
            if (left > 0) {
                progress.textContent = `เปิดแล้ว ${readCount} ใบ · เหลืออีก ${left} ใบ`;
                hint.textContent     = 'วางเมาส์เพื่อแผ่ไพ่ · เลือกไพ่เพื่ออ่านข้อความ';
            } else {
                progress.textContent = 'เปิดครบทุกใบแล้ว 🎂 สุขสันต์วันเกิด!';
                progress.classList.add('done');
                hint.textContent = '';
            }
            busy = false;
        }, READ_DELAY);
    }

    // ─── Typewriter ──────────────────────────────────────────────────────────

    const lines = [
        "This year ...",
        "29 June 2026",
        "There is something I want to say to you!"
    ];
    let lineIdx = 0, charIdx = 0;

    function typeWriter() {
        if (lineIdx >= lines.length) return;

        if (charIdx === 0) {
            const p = document.createElement("p");
            p.className = "line";
            p.id = "line" + lineIdx;
            document.getElementById("hero").appendChild(p);
        }

        const currentLine = document.getElementById("line" + lineIdx);
        currentLine.innerHTML = lines[lineIdx].substring(0, charIdx + 1) + '<span class="cursor"></span>';
        charIdx++;

        if (charIdx < lines[lineIdx].length) {
            setTimeout(typeWriter, 100);
        } else {
            currentLine.innerHTML = lines[lineIdx];
            charIdx = 0;
            lineIdx++;
            setTimeout(typeWriter, 1000);
        }
    }

    typeWriter();
</script>

</body>
</html>
